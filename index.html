<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Inspections — Dispatch Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #F5F4F0;
      color: #1C1C1A;
      display: flex;
      flex-direction: column
    }

    .top {
      height: 54px;
      background: #fff;
      border-bottom: 1px solid #E0DED8;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      flex-shrink: 0
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #C4952A, #9B7A1F);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0
    }

    .brand {
      font-size: 17px;
      font-weight: 700
    }

    .sep {
      width: 1px;
      height: 28px;
      background: #E0DED8;
      flex-shrink: 0
    }

    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center
    }

    .st {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .st-d {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .st-s {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0
    }

    .st-n {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 17px
    }

    .st-l {
      font-size: 11px;
      color: #9C9A94
    }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      height: calc(100vh - 54px)
    }

    .sb {
      width: 380px;
      background: #fff;
      border-right: 1px solid #E0DED8;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100%
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #E0DED8;
      flex-shrink: 0
    }

    .tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #9C9A94;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      text-transform: uppercase;
      letter-spacing: .07em;
      transition: all .15s
    }

    .tab:hover {
      color: #6B6A65
    }

    .tab.on {
      color: #C4952A;
      border-bottom-color: #C4952A
    }

    .tab .b {
      display: inline-block;
      background: #DC3545;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 5px;
      font-family: 'JetBrains Mono', monospace
    }

    .sb-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 10px
    }

    .qc {
      background: #fff;
      border: 1.5px solid #E8E6E1;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .2s
    }

    .qc:hover {
      border-color: #D4C9A8;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .05)
    }

    .qc.on {
      border-color: #C4952A;
      box-shadow: 0 0 0 3px rgba(196, 149, 42, .15)
    }

    .qc.urg {
      border-left: 4px solid #DC3545
    }

    .qc-r1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px
    }

    .qc-name {
      font-weight: 700;
      font-size: 14px
    }

    .qc-age {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 8px;
      border-radius: 5px;
      font-weight: 600
    }

    .ag {
      background: #E8F5E9;
      color: #2E7D32
    }

    .ay {
      background: #FFF3E0;
      color: #E65100
    }

    .ar {
      background: #FCE4EC;
      color: #C62828
    }

    .qc-addr {
      font-size: 12px;
      color: #6B6A65;
      margin-bottom: 7px
    }

    .qc-tags {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 10px;
      margin-bottom: 7px
    }

    .qc-tg {
      padding: 3px 9px;
      border-radius: 5px;
      background: #F3F2EE;
      color: #6B6A65;
      font-weight: 600
    }

    .qc-fm {
      color: #9C9A94
    }

    .qc-note {
      font-size: 11px;
      color: #9C9A94;
      margin-bottom: 10px;
      font-style: italic;
      line-height: 1.45;
      border-left: 2px solid #E8E6E1;
      padding-left: 10px
    }

    .qc-match {
      background: #FAF7F0;
      border: 1px solid #EBE5D5;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px
    }

    .qm-star {
      font-size: 18px;
      flex-shrink: 0
    }

    .qm-info {
      flex: 1;
      min-width: 0
    }

    .qm-name {
      font-size: 13px;
      font-weight: 700
    }

    .qm-det {
      font-size: 10px;
      color: #9C9A94;
      margin-top: 2px
    }

    .qm-dist {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0
    }

    .dg {
      color: #2E7D32
    }

    .dy {
      color: #E65100
    }

    .dr {
      color: #C62828
    }

    .qc-btn {
      width: 100%;
      padding: 10px 0;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #C4952A, #9B7A1F);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s
    }

    .qc-btn:hover {
      opacity: .88;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(196, 149, 42, .25)
    }

    .ic {
      background: #fff;
      border: 1.5px solid #E8E6E1;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .2s
    }

    .ic:hover {
      border-color: #D4C9A8;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .05)
    }

    .ic.on {
      border-color: #C4952A;
      box-shadow: 0 0 0 3px rgba(196, 149, 42, .15)
    }

    .ic-r1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px
    }

    .ic-name {
      font-weight: 700;
      font-size: 14px
    }

    .ic-sl {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 5px
    }

    .sg {
      background: #E8F5E9;
      color: #2E7D32
    }

    .sy {
      background: #FFF3E0;
      color: #E65100
    }

    .sr {
      background: #FCE4EC;
      color: #C62828
    }

    .ic-loc {
      font-size: 12px;
      color: #6B6A65;
      margin-bottom: 8px
    }

    .ic-bar {
      height: 5px;
      background: #F3F2EE;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px
    }

    .ic-fill {
      height: 100%;
      border-radius: 3px
    }

    .ic-specs {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 6px
    }

    .ic-sp {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 5px;
      background: rgba(196, 149, 42, .08);
      color: #A07A1E;
      font-weight: 600
    }

    .ic-ct {
      font-size: 11px;
      color: #9C9A94;
      margin-top: 4px
    }

    .map-wrap {
      flex: 1;
      position: relative;
      height: 100%
    }

    #map {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      background: #e5e3df
    }

    /* INSPECTOR NAME LABELS on map */
    .ins-label {
      background: #fff;
      border: 1.5px solid #C4952A;
      border-radius: 6px;
      padding: 3px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #1C1C1A;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .12);
      pointer-events: none
    }

    .ins-label::before {
      display: none
    }

    .ins-label::after {
      display: none
    }

    /* DISTANCE LABEL on lines */
    .dist-label {
      background: rgba(196, 149, 42, .95);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .15)
    }

    .dist-label::before {
      display: none
    }

    .dist-label::after {
      display: none
    }

    /* LEGEND */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 14px;
      z-index: 1500;
      background: #fff;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .1);
      border: 1px solid #E0DED8;
      font-size: 12px;
      line-height: 1.8
    }

    .legend-title {
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #9C9A94;
      margin-bottom: 6px
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(0, 0, 0, .1)
    }

    .legend-sq {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: #fff
    }

    .legend-line {
      width: 24px;
      height: 0;
      border-top: 3px solid #C4952A;
      flex-shrink: 0
    }

    .legend-line-dash {
      width: 24px;
      height: 0;
      border-top: 2px dashed #bbb;
      flex-shrink: 0
    }

    /* PULSE ANIMATION for unassigned */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, .5)
      }

      70% {
        box-shadow: 0 0 0 12px rgba(220, 53, 69, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0)
      }
    }

    .pulse-dot {
      animation: pulse 2s ease-out infinite
    }

    .ov {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .16);
      padding: 18px 22px;
      width: 420px;
      max-width: calc(100% - 40px);
      display: none;
      border: 1px solid #E0DED8
    }

    .ov.show {
      display: block;
      animation: slideUp .25s ease
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0)
      }
    }

    .ov-x {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: #F3F2EE;
      color: #6B6A65;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .ov-x:hover {
      background: #E8E6E1
    }

    .ov-tag {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 700;
      margin-bottom: 5px
    }

    .ov-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 3px;
      padding-right: 36px
    }

    .ov-addr {
      font-size: 12px;
      color: #6B6A65;
      margin-bottom: 3px
    }

    .ov-meta {
      font-size: 11px;
      color: #9C9A94;
      margin-bottom: 12px
    }

    .ov-rec {
      background: #FAF7F0;
      border: 1px solid #EBE5D5;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px
    }

    .ov-badge {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      background: linear-gradient(135deg, #C4952A, #9B7A1F);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0
    }

    .ov-ri {
      flex: 1
    }

    .ov-rn {
      font-size: 15px;
      font-weight: 700
    }

    .ov-rd {
      font-size: 11px;
      color: #9C9A94;
      margin-top: 3px
    }

    .ov-dst {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 20px;
      flex-shrink: 0
    }

    .ov-btn {
      width: 100%;
      padding: 12px 0;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #C4952A, #9B7A1F);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit
    }

    .ov-btn:hover {
      opacity: .88
    }

    .ov-more {
      margin-top: 10px;
      font-size: 11px;
      color: #C4952A;
      font-weight: 600;
      cursor: pointer;
      text-align: center
    }

    .toast {
      position: fixed;
      top: 70px;
      right: 20px;
      z-index: 9999;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .15);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      transition: transform .35s cubic-bezier(.4, 0, .2, 1);
      border-left: 4px solid #2E7D32
    }

    .toast.show {
      transform: translateX(0)
    }

    .mc {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 1500;
      display: flex;
      gap: 6px
    }

    .mc-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #E0DED8;
      background: #fff;
      color: #6B6A65;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08)
    }

    .mc-btn:hover {
      border-color: #C4952A;
      color: #A07A1E
    }

    .mc-btn.on {
      border-color: #C4952A;
      background: rgba(196, 149, 42, .08);
      color: #A07A1E
    }

    .empty {
      padding: 48px 24px;
      text-align: center;
      color: #9C9A94
    }

    .empty-i {
      font-size: 32px;
      margin-bottom: 10px
    }

    .empty-t {
      font-weight: 600;
      font-size: 14px;
      color: #6B6A65
    }

    .leaflet-tooltip.ltt {
      background: #fff;
      color: #1C1C1A;
      border: 1px solid #E0DED8;
      border-radius: 10px;
      padding: 8px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .1);
      line-height: 1.5
    }

    .leaflet-tooltip.ltt::before {
      border-top-color: #E0DED8
    }

    .leaflet-control-attribution {
      font-size: 9px !important
    }
  </style>
</head>

<body>

  <div class="top">
    <div class="logo">GPA</div>
    <div class="brand">GPA Inspections</div>
    <div class="sep"></div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="main">
    <div class="sb">
      <div class="tabs">
        <div class="tab on" id="t-queue" onclick="setTab('queue')">Unassigned <span class="b" id="bdg">0</span></div>
        <div class="tab" id="t-inspectors" onclick="setTab('inspectors')">Inspectors</div>
        <div class="tab" id="t-all" onclick="setTab('all')">All Jobs</div>
      </div>
      <div class="sb-scroll" id="sbBody"></div>
    </div>
    <div class="map-wrap">
      <div id="map"></div>
      <div class="mc"><button class="mc-btn" id="covBtn" onclick="toggleCov()">⊙ Coverage Rings</button></div>
      <div class="ov" id="overlay"></div>
      <!-- LEGEND -->
      <div class="legend">
        <div class="legend-title">Map Legend</div>
        <div class="legend-row">
          <div class="legend-dot pulse-dot" style="background:#DC3545;border-color:rgba(220,53,69,.3)"></div> Unassigned
          Inspection
        </div>
        <div class="legend-row">
          <div class="legend-dot" style="background:#E8850C"></div> Assigned Inspection
        </div>
        <div class="legend-row">
          <div class="legend-dot" style="background:#2E7D32"></div> Completed Inspection
        </div>
        <div class="legend-row">
          <div class="legend-sq" style="background:#C4952A">MR</div> Inspector (with name label)
        </div>
        <div class="legend-row">
          <div class="legend-line"></div> Best match connection
        </div>
        <div class="legend-row">
          <div class="legend-line-dash"></div> Other nearby inspectors
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"><span style="font-size:22px">✅</span>
    <div>
      <div id="toastTxt" style="font-size:13px;font-weight:600"></div>
      <div id="toastSub" style="font-size:11px;color:#9C9A94;margin-top:2px"></div>
    </div>
  </div>

    function initMap() {

      }).addTo(map);

    function hav(a, b, c, d) { var R = 3959, dL = (c - a) * Math.PI / 180, dG = (d - b) * Math.PI / 180, x = Math.sin(dL / 2) * Math.sin(dL / 2) + Math.cos(a * Math.PI / 180) * Math.cos(c * Math.PI / 180) * Math.sin(dG / 2) * Math.sin(dG / 2); return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x)) }
    function mi2m(m) { return m * 1609.34 }
    function daysAgo(d) { return Math.max(0, Math.floor((new Date('2026-04-01') - new Date(d)) / 864e5)) }
    function ageT(d) { return d === 0 ? 'Today' : d === 1 ? 'Yesterday' : d + ' days' }
    function ageC(d) { return d >= 5 ? 'ar' : d >= 3 ? 'ay' : 'ag' }
    function distC(d) { return d < 30 ? 'dg' : d < 70 ? 'dy' : 'dr' }
    function slotC(a) { return a > 2 ? 'sg' : a > 0 ? 'sy' : 'sr' }
    function distColor(d) { return d < 30 ? '#2E7D32' : d < 70 ? '#E65100' : '#C62828' }

    function bestM(insp) {
      return inspectors.map(function (ins) {
        var sm = ins.specs.some(function (s) { return insp.type.toLowerCase().indexOf(s.split(' ')[0].toLowerCase()) >= 0 });
        return { id: ins.id, name: ins.name, city: ins.city, state: ins.state, lat: ins.lat, lng: ins.lng, color: ins.color, dist: hav(insp.lat, insp.lng, ins.lat, ins.lng), avail: ins.cap - ins.used, sm: sm, phone: ins.phone, specs: ins.specs, cap: ins.cap, used: ins.used, radius: ins.radius }
      }).filter(function (i) { return i.avail > 0 }).sort(function (a, b) { return (a.dist - (a.sm ? 20 : 0)) - (b.dist - (b.sm ? 20 : 0)) });
    }

    // INSPECTOR icon: bigger square with colored border
    function insIcon(ins, sz, sel) {
      var s = sel ? sz + 12 : sz;
      var init = ins.name.split(' ').map(function (n) { return n[0] }).join('');
      var av = ins.cap - ins.used;
      var bg = sel ? ins.color : '#fff';
      var fg = sel ? '#fff' : '#1C1C1A';
      var bdr = sel ? ins.color : ins.color;
      var bw = sel ? '3' : '2';
      var bc = av > 2 ? '#2E7D32' : av > 0 ? '#E65100' : '#C62828';
      var glow = sel ? '<rect x="0" y="0" width="' + (s + 8) + '" height="' + (s + 8) + '" rx="14" fill="' + ins.color + '" opacity=".2"/>' : '';
      return L.divIcon({
        className: '', iconSize: [s + 16, s + 16], iconAnchor: [(s + 16) / 2, (s + 16) / 2],
        html: '<svg width="' + (s + 16) + '" height="' + (s + 16) + '" viewBox="-4 -4 ' + (s + 16) + ' ' + (s + 16) + '">' + glow + '<rect x="' + ((s - sz) / 2) + '" y="' + ((s - sz) / 2) + '" width="' + sz + '" height="' + sz + '" rx="9" fill="' + bg + '" stroke="' + bdr + '" stroke-width="' + bw + '"/><text x="' + (s / 2) + '" y="' + (s / 2 + 1) + '" text-anchor="middle" dominant-baseline="middle" fill="' + fg + '" font-size="' + Math.round(sz * .36) + '" font-weight="700" font-family="DM Sans,sans-serif">' + init + '</text><circle cx="' + (s - 2) + '" cy="8" r="10" fill="' + bc + '" stroke="#fff" stroke-width="2"/><text x="' + (s - 2) + '" y="9" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">' + av + '</text></svg>'
      });
    }

    // INSPECTION icon: circle with status-specific styling
    function inspIcon(status, sz, sel) {
      var cols = { unassigned: '#DC3545', assigned: '#E8850C', completed: '#2E7D32' };
      var c = cols[status] || '#999'; var s = sel ? sz + 12 : sz;
      var isUn = status === 'unassigned';
      // Unassigned gets an outer pulsing ring
      var outerRing = isUn && !sel ? '<circle cx="' + (s / 2) + '" cy="' + (s / 2) + '" r="' + (sz / 2 + 3) + '" fill="none" stroke="' + c + '" stroke-width="2" opacity=".3"><animate attributeName="r" from="' + (sz / 2 + 2) + '" to="' + (sz / 2 + 10) + '" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" from=".4" to="0" dur="2s" repeatCount="indefinite"/></circle>' : '';
      var selRing = sel ? '<circle cx="' + (s / 2) + '" cy="' + (s / 2) + '" r="' + (s / 2) + '" fill="none" stroke="' + c + '" stroke-width="2.5" opacity=".4"><animate attributeName="r" from="' + (s / 2) + '" to="' + (s / 2 + 12) + '" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from=".5" to="0" dur="1.5s" repeatCount="indefinite"/></circle>' : '';
      var bdr = sel ? 'stroke:#fff;stroke-width:3' : 'stroke:rgba(255,255,255,.8);stroke-width:2';
      return L.divIcon({
        className: '', iconSize: [s + 14, s + 14], iconAnchor: [(s + 14) / 2, (s + 14) / 2],
        html: '<svg width="' + (s + 24) + '" height="' + (s + 24) + '" viewBox="-12 -12 ' + (s + 24) + ' ' + (s + 24) + '">' + outerRing + selRing + '<circle cx="' + (s / 2) + '" cy="' + (s / 2) + '" r="' + (sz / 2) + '" fill="' + c + '" style="' + bdr + '" filter="drop-shadow(0 2px 4px rgba(0,0,0,.25))"/>' + (isUn ? '<text x="' + (s / 2) + '" y="' + (s / 2 + 1) + '" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="' + (sz > 14 ? '10' : '8') + '" font-weight="700">!</text>' : '') + '</svg>'
      });
    }

    function clearMap() {
      mM.forEach(function (m) { map.removeLayer(m) }); mM = [];
      mL.forEach(function (l) { map.removeLayer(l) }); mL = [];
      mC.forEach(function (c) { map.removeLayer(c) }); mC = [];
      mLabels.forEach(function (l) { map.removeLayer(l) }); mLabels = [];
    }

    function renderMap() {
      if (!map) return; clearMap();
      var si = selId ? inspections.find(function (i) { return i.id === selId }) : null;
      var sn = selInsId ? inspectors.find(function (i) { return i.id === selInsId }) : null;
      var near = si ? bestM(si).slice(0, 3) : [];
      var nIds = near.map(function (n) { return n.id });

      // Coverage circles
      if (showCov) { inspectors.forEach(function (ins) { var c = L.circle([ins.lat, ins.lng], { radius: mi2m(ins.radius), color: ins.color, fillColor: ins.color, fillOpacity: .06, weight: 1.5, opacity: .35, dashArray: '6,6', interactive: false }).addTo(map); mC.push(c) }) }

      // Connection lines WITH distance labels
      if (si) {
        near.forEach(function (ins, idx) {
          var l = L.polyline([[si.lat, si.lng], [ins.lat, ins.lng]], { color: idx === 0 ? '#C4952A' : '#BBBBBB', weight: idx === 0 ? 3.5 : 1.5, opacity: idx === 0 ? .85 : .35, dashArray: idx === 0 ? null : '8,8' }).addTo(map);
          mL.push(l);
          // Distance label at midpoint
          var midLat = (si.lat + ins.lat) / 2;
          var midLng = (si.lng + ins.lng) / 2;
          var dist = Math.round(ins.dist);
          var label = L.tooltip({ permanent: true, direction: 'center', className: idx === 0 ? 'dist-label' : 'dist-label', offset: [0, 0] }).setLatLng([midLat, midLng]).setContent(dist + 'mi').addTo(map);
          mLabels.push(label);
        });
      }
      if (sn) {
        inspections.filter(function (i) { return i.to === sn.id && i.status === 'assigned' }).forEach(function (insp) {
          var l = L.polyline([[sn.lat, sn.lng], [insp.lat, insp.lng]], { color: sn.color, weight: 2.5, opacity: .55 }).addTo(map); mL.push(l);
        });
      }

      // INSPECTOR markers + permanent name labels
      inspectors.forEach(function (ins) {
        var isSel = selInsId === ins.id, isTop = nIds[0] === ins.id, dim = si && nIds.indexOf(ins.id) < 0;

        if (!dim) nameLabel.addTo(map);
        mLabels.push(nameLabel);
      });

      // INSPECTION markers
      inspections.forEach(function (insp) {
        var isSel = selId === insp.id, isLinked = sn && insp.to === sn.id, dim = (sn && !isLinked) || (si && si.id !== insp.id);
        var sz = isSel ? 20 : insp.status === 'unassigned' ? 16 : 12;
        var m = L.marker([insp.lat, insp.lng], { icon: inspIcon(insp.status, sz, isSel), zIndexOffset: isSel ? 3000 : isLinked ? 1800 : insp.status === 'unassigned' ? 1000 : 400, opacity: dim ? .15 : 1 }).addTo(map);
        m.bindTooltip('<b>' + insp.name + '</b><br><span style="color:#6B6A65">' + insp.type + '</span><br><span style="color:#9C9A94;font-size:10px">' + insp.addr + '</span>', { direction: 'top', offset: [0, -14], className: 'ltt' });

    function doAssign(iid, insid) {
      const insp1 = inspections.find(i => i.id === iid);
      const ins1 = inspectors.find(i => i.id === insid);

      if (!insp1 || !ins1) return;

      // 🚫 Prevent over-assignment
      if (ins1.used >= ins1.cap) {
        showToast("Inspector is already at full capacity ");
        return;
      }

      // ✅ Increment BEFORE sending (this is the new value)
      const newUsed = ins1.used + 1;
      var insp = inspections.find(function (i) {
        return i.id === iid;
      });

      console.log(newUsed)

      var ins = inspectors.find(function (i) {
        return i.id === insid;
      });

      if (insp && ins) {
        // 🔥 Call backend API
        fetch(`https://twitter-server-8ibu.onrender.com/assign-inspector/${iid}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            inspectorId: insid,
            used: newUsed,
          }),
        })
          .then((res) => res.json())
          .then(async (data) => {
            await Promise.all([fetchInspectors(), fetchInspections()]);

            // 🎨 Rerender UI with updated data
            renderAll();
            setTimeout(() => {
              window.location.reload();
            }, 1000);
            console.log("API Success:", data);
          })
          .catch((err) => {
            console.error("API Error:", err);
          });

        // ✅ Update UI locally
        insp.status = "assigned";
        insp.to = insid;
        ins.used++;

        showToast(
          "Assigned to " + ins.name,
          insp.name +
          " &middot; " +
          Math.round(hav(insp.lat, insp.lng, ins.lat, ins.lng)) +
          " miles"
        );
      }

      selId = null;
      // renderAll();
    }



    // window.addEventListener('load',function(){initMap();setTimeout(function(){if(map)map.invalidateSize()},500);setTimeout(function(){if(map)map.invalidateSize()},1500)});
  </script>
